body:
  text: 錢塘沙門釋智圓撰五迦葉陳如及後分四品半明折攝涅槃用二後分四品明化周掩迹但在第五用章所收此乃示滅之用也後分疏云第六化周掩迹者此於第五別數之子科二段故當第六故知章安之世雖無後分經義已圓故疏釋通序但序五章故無更立六章之理詳之初折惡攝邪用二初題目二初正釋題目二開善下懸示分章二初四師分章二今家分章三初標示章名二此經下廣釋辨異三諸異下總結從初二本文二初分科二初明下隨釋二初迦葉品折惡二初明佛性用三初分科敘意二舊解下破古異釋三初破解善惡人二初兩師異解二疏主會通二破立接識義二初古義立義二此義下今家委破二初推經縱奪二若爾下約義正破三初總斥同彼外計二若言下歷難令義無歸二初以始起例未起破二若從下無明例四住破二初以始起品例後起品破二若無下以無明窟例四住窟破三若爾下牒執為經所破三破善星非權二初舊謂善星非權二是義下今例善星是權三斷善下隨文正解二初斷善二初分科顯示二初就下隨文正解三初斷善人二初分科二初文下隨釋二初問二初緣起二初明佛有能化之德二初內有慈悲二外有方便二明善星有可化之緣二初明是子二具三德二正問二初分科二初又下隨釋二初作兩難二初難何故記是惡人二初難何故記是闡提二難何故地獄劫住二難何不先為說法二作兩結二初結初難明無慈悲二結後難明無方便二答二初標示分科二何以下隨文正釋二初答兩難二初超答後不先說法難二初明緣有淺深故說有次第六初教三子譬三初舉譬問二述事奉答三合譬作解二種三田譬三初舉譬問二述事奉答三合譬作解三用三器譬三初舉譬問二述事奉答三合譬作解四治三病譬三初舉譬問二述事奉答三合譬作解五乘三馬譬三初舉譬問二述事奉答三合譬作解六施三人譬三初舉譬問二述事奉答三合譬作解二明佛心平等等說無偏二追答前記是惡人難二初分科敘意二初文下隨文正釋二初答闡提三初無信三初不信佛是無所畏人二不信佛是無妄語人三不信佛是無嫉妬人二無慧三無定二初明雖得後失故言無定二總結起邪所以記之二答記意二初分科二隨釋二初明記意二明不可治三初法二譬三合二初番二初正合二以譬帖合二番二初正合二以譬帖合二答兩結二初分科二次善下隨釋二初答先結無慈悲心二初正答三初法二譬三合二料簡二初問二答二初正答二引昔顯實二答後無方便結二斷善相三斷善見二生善二歎經二陳如品攝邪二化周掩迹用二斷善相二初分科二次佛下隨釋三初正明斷善五初番二初問二答二番二初問二答三番二初問二答四番二初問二答五番二初分科二初問下隨釋二初問二初問佛性二問闡提二答二初分科二性非下隨釋二初答初問二初答問二初歎問二正答二論義二初問二答二答次問二初分科二法說下隨釋二初牒問非之二正答三初法二譬三合二根性不定二初分科二初如下隨釋二初正明不定二初不定三初知不定根二出不定相三結不定二斷善根三初明不定斷善二若定則不爾三證不定二問答論義二初問二答二初分科敘意二初明下隨文釋義二初就善星答三初明居王位能破滅二出家不出家俱斷善三結知根力二就餘人答二初分科二法可下隨釋二初明不定二初斷善三初正斷善二出斷善之行三結其斷善二生善三初法二譬三合二初合二結知根力二辨升沈三初舉事問二領旨奉答三合三初就果合二就因合三結知根力三說教不定二初敘意分科二初明下隨文釋義二初問三初明知根二明執諍三結問二答二初分科二初言下隨釋三初答知根問二初正明說教不定四初明理深難解二出愚智兩人二初出智二出愚三須不定說三初法二譬三合四結知根力二廣明不定法二初分科二初列下隨釋三初正明不定法二初名義不定二初列章二解釋二初分科二釋初下隨釋二初釋三章門三初釋一名含衆名二釋一義說無量名三釋無量義說無量名二重釋第二門二廣略不定二初分科二隨釋三初列四章門二釋出三結二初分科二次何下隨釋二初結不定二結知根二初明佛知非淺識二明為人不定二引證三結非所知二答執諍問三答結問二答執諍問二初分科二隨釋二初略答二廣答二初敘意總標二一是下隨文別釋草一初涅槃不涅槃二初懸示部執三初正示部執二古來下古師評判三皆失下總斥成非二初疏主總斥二河西下兩師示義二初河西二觀師二此初下隨文正解二初分科二先為下隨釋二初章門二解釋二初釋執定涅槃二初釋五初為諸仙二為力士三為純陀四為須跋五為世王二結二釋執定不涅槃二初分科二隨釋二初釋二結二有我無我二初懸示部執三初正示部執二招提下古師評判二初招提判二部義二真諦難招提師二初直爾據難二初定二理中下破二更約涅槃竝二初雙定二若涅下例破三若中下疏主示義二就文下隨文正解二初分科二隨釋二初明有我二初明相續假我以破邪見無我二明因成我二初正明因成二因成所成二明無我二初分科二一問下隨釋二初佛說三初假問三初問名二問體三問何緣故我二假答二初分科二大意下隨釋三初總答大意二初舉章門二釋出二別答二初述意二初答下隨釋三初答假名二答假體三答假因緣三結無益四初假名故有二初譬二合二即離皆無三簡四結無我三觀無我得益二起執三有中陰無中陰二初懸示部執二文中下隨文正解二初定有二定無四有退無退二初懸示部執二隨文正解二初退三初法三初通明比丘退二初通明二退緣二別明羅漢二初直云