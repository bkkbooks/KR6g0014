  text: 錢塘沙門釋智圓撰二德王品證十功德二初題目二初破古解二初敘二今皆下破二今依下明今釋二初據文定義二前三下釋疑顯意二本文二初分科二隨釋二初佛明十功德二初唱數三初對告二唱數三稱歎二別釋二初分科二舊解下隨釋二初徵起二正釋二初破古分判二初破古分節二今但下明今判文二初文下隨文釋義十初明第一功德二初分科二舊明下隨釋三初明五事三初標二列二初章安約義正明二初敘古立義二初二家約三慧二興皇約相由二今明下破古顯今二初歷破三家二文明下結成十失二初明違文成失二若依下示依文無過二荊溪徵文助顯二初助成約證二故知下顯今斥古三別解二初分科二標不下隨釋五初釋不聞聞三初標二釋三初敘佛意分經二此之下徵文歎顯義三今初下約三諦正釋三初不聞聞第一義中諦二初分科二隨釋二初通列二通釋二不聞聞俗諦二初分科二隨釋二初列俗諦法二明祕密三不聞聞真諦二初分科二皆下隨釋二初聞真諦法二聞祕密三結二釋聞已利益二初分科二標證下隨釋三初標二釋二初分科二先提下隨釋二初略二初提緣由二顯真證二廣二初正釋經文二初敘緣由二歷四法明益二不從下徵文斥古三結三釋斷疑心二初分科二隨釋三初標二釋三初敘意斥古二釋文下隨文釋義二初分科二初名下隨釋二初略釋離三初離名義兩疑二離八倒疑三離權實疑二廣釋離二初分科二初如下隨釋三初離實法上疑二離假名上疑三離依正上疑三結四釋慧心正直二初分科二隨釋三初標二釋三結五釋祕密義二初分科二隨釋三初標二釋二初分科二隨釋三初果深密二因深密三不思議深密三結二論義二初分科二初領下隨釋四初德王論二初問二初領旨仰非二正難二初敘意分科二初文下隨文釋義三初作奪門二初法三初通約有無奪二初奪二遮二正就不聞聞奪三結二初結定成兩二結定不應一二譬二初分科二正釋二初譬二合二作縱門二初分科二隨釋三初縱衆生二初縱二徵二從佛果二初縱二徵三更結兩縱三作況門二初分科二隨釋二初就色聲況二就三世況二歎答二琉光論三無畏論四德王重論三結二明第二功德三明第三功德四明第四功德五明第五功德六明第六功德七明第七功德八明第八功德九明第九功德十明第十功德二高貴領解三總結二琉光論二初分科二初放下隨釋二初從遠來二初現來相二初放光二問答二初分科二隨釋二初明其本二初無言辨本二寄言辨本二初分科二私謂下隨釋二初問二答二初六番破定相六初約智慧二約涅槃三約如來四約慈悲五約念佛六約不共二一番約因緣二初治者述文旨二疏主立問答二明其迹二初分科二佛言下隨釋二初問二答三初此述彼土二彼述此土三明菩薩欲來二正來二初正釋來義二釋疑料簡二初明彼此二佛互遣菩薩二初問初答二明淨穢主俱說涅槃四初引迦葉不說例難二明顯常俱說正答三徵經文舉例再竝四約三悉俱談通解二至已論義二初分科二隨釋二初傍論去來二初懸示二初明問答隨緣二此中下示人法傍正二佛問下正釋二初佛問二琉光答二初分科二琉光下總釋二初兩番就前境二八番約迷悟二正問上義二初分科二隨釋四初請許二問答二初琉光問二初對三異立疑二解云下據理同答釋二佛答二初分科二許下隨釋二初緣起二初讚許二初牒文具義二汝下牒文正示三初示進戒義二慧下示般若義二初示義述意二初明不聞聞即佛性二若琉下對德王問再會同二若聞下約性釋疑二初舉一疑三二不聞下對性答釋三作船下示餘三義二誡聽三初分科二誡未下正解二初誡未聞二誡聞已二初分科二當生下正釋三初三事誡覆二初標覆二釋覆二二事誡漏三五事誡汙二初順釋二若作下反顯三問琉下釋疑二正答三初分經文二南下破古解二初敘古二初三家通分三番三初約法譬二約教證三約三根二四師解初四句四初約二諦二約真應三約生死涅槃四約始終二今謂下今破三初舉法體總斥偏解二又一下歷諸師別示過失三又此下明顯證重彈失意三若以下今正釋二初約不聞聞四句二初正釋二初正約四法解三初標示二佛雖下正釋三今取下結顯二初結依佛意二如此下結歎斷疑二復次下更約三義釋三初約五行釋二約五佛性釋三約三涅槃釋二若得下結廣二應開不生生兩四句二初顯同示義二興下例通解釋二初興皇約本文三偈例通二今師約大小律論例通二初例通小乘律二例通大乘論三重研二初敘意分科二安住下隨文釋義二初約內四句三初釋安住世諦二釋世諦死時三釋四住菩薩二約外四句四結難二初敘意分科二初文下隨文釋義三初難三初就常無常難二就自生生他難三就本有本無難二解二初分科二初非下隨釋三初非六問二初總示意二初言下正釋文二初釋六非二釋一是二釋六非二初隨文正釋七初釋第一不生生二釋第二生生三釋第三生不生四釋第四不生不生五釋第五生六釋第六不生七釋第七可說二初釋十因緣二初正釋因緣二此止下通結指廣二釋莫入空定二然經下約義廣示二初重廣一是二初敘意二所謂下正示二初約說默正辨二初明可說二亦應下明不可說二又四下約事理重明二初泛明相即明事可說二何以下正例經文明理不說二地師下再釋六非二初暫許地師二今欲下正明今義二初總標二初兩下別釋三答六問二初分科二初別下隨釋二初答前兩問二初別就四相答四初生二住三異四壞二合就四相二答後四問二初分科二此初下隨釋二初正答第五兼答第六二正答第四兼答第三二初分科二隨釋三初法二譬二初正因譬意二此中下解妨例前三合三領二初分科二陳下隨釋二初經家敘二正陳解二初白陳二陳衆三無畏論二初分科二隨釋三初請許二論義二初分科敘意二問經下隨文釋義三初問二初問此生彼二問彼利根二答二初敘意分科二然淨下隨文釋義二初是止善二是行善三領解三請答德王五問二初敘意分章二釋中下隨文釋義二初問二佛答二初讚誡二正答二初舉未至不至二初牒至不至章二解釋二初通敘大意二初結前生後二初聞下約根述意二就此下正釋經文二初分文述意二然此下隨句解釋二初明涅槃有至不至二初未至不至二初例上顯同二若爾下對前釋妨二不至至二明生死有至不至二初至不至二至至二牒聞不聞二初列四章二但釋一句四德王重論二初分科二初文下隨釋二初單問果二初問二初約三問分經三初問涅槃始有即是無常二問因莊嚴故有復是無常三問涅槃若有亦是無常五初是有故無常二可見故無常三不平等故無常四有須待故無常疏云第三問復有四章別者謂一章正明是有餘四別有異名合論即五章也五有名字故無常二不者下約七問分經今對答文且依三段二佛答二初分科二地人下隨釋三初答本無今有三初法二譬三合二答因莊嚴二初法二譬三初譬二初譬二合二譬二初譬二合三譬二初譬二合三答涅槃是有二初敘妨述意二前舉下隨文釋義二初舉五因二舉二因二雙問因果二初問二初問因二問果二佛答二初分科二隨釋二初雙答因果二別答因果二初分科二初正下隨釋二初因二初順因二初正答二初少分涅槃五初約有乞無乞二約時施常施三約生悔不悔四約生怖不怖五約望報不望二判度二歎經二初分科二隨釋二初結菩薩為歎二結三乘為歎二違因二初分科二初問下隨釋三初問三初兩問四罪二兩問一闡提三一問不定二初正釋經文二前難下牒前述意二答二初分科二一歎下隨釋二初歎問四初歎現德二歎往因三歎所問超踰人天四誡聽許說二答問二初分科二初答下隨釋三初答第五不定問三初標二答三結二答第三斷善問兼答第一第二罪人問二初正答第三二兼答第一第二三重答第五不定問兼答第四問二初分科二此即下隨釋三初泛明不定四初明惡人不定二明諸法不定二初分科二隨釋二初法二譬三初幻二初譬二合二炎二初譬二合三譬二初譬二合三明普人不定四明如來不定二廣明不定二初懸談義旨二初破古二家釋義二初舊師真應釋二初敘彼義二明今破二興皇互非釋二初敘彼義二明今破二今明下今約三諦互融二今先下隨文釋義二初分科辨示二於第下隨文正釋二初唱章門二解釋十六初釋天非天二釋人非人三釋鬼非鬼四釋三惡非三惡五釋衆生非衆生六釋法非法七釋色非色八釋長非長九釋短非短十釋相非相十一釋心非心十二釋非有為無為十三釋非常非無常十四釋幻非幻十五釋定非定十六釋漏非漏二初敘意分科二問何下隨文釋義二初明非有漏二初明三漏二明七漏二初懸示二初列名示義二今文下對辨異同二初解下隨釋六初釋第一見漏二初敘闕略意二文又下分文正釋二初分科二疑乃下正釋二初廣明疑心二別明見使三初莊嚴二開善釋二初列數二所言下示義三河西釋二釋第三根漏二初分科二隨釋三初明凡夫因根起漏二明菩薩不爾三結如來無漏三釋第四惡漏二初釋名分科二初文下隨科釋義二初明能離之道二初明菩薩能離二引昔證今二初釋偈文二初舊人解二初牒文配義二言得下簡示樂體二初舊師約因義解二有人下他人徵二事破二觀師釋三初歎廣敘義二隨義釋通十初三寶二四諦三三德四四德五生不生偈六本有今無偈七雪山偈八四悉檀九中論偈十四種佛性三觀師下結示該博二前梵下釋不痛二明所離之惡四釋第五親近漏五釋第六受漏三初釋惡覺即受二其中下示沙門等義三此中下辨六難同異二初正辨異二何故下釋異意二初問二純陀下釋六釋第七念漏二初分科二行心下隨釋二初明漏相二明菩薩無漏二初分科二隨釋三初法二譬二初分科二初言下隨釋二初譬八初四蛇二五旃陀羅三詐親四聚落五六賊六大河七草筏八到岸二合八初四蛇二五旃陀羅三詐親四聚落五六賊六大河七草筏八到岸三結二明非無漏二初數論異解二此中下今師正義三結不定三領解二果二明果二初敘意分科二初但下隨文釋義二初騰果問二如來答二初歎問二正答二初分科敘意二就相下隨文釋義二初就相待答二初舉譬二合二初分科二初標下隨釋二初總合二初列大小兩章二釋兩章二初釋小二初舉少分滅苦二舉斷伏五滅二初分科二初從下隨釋二初出凡聖兩章二釋二初釋二釋成二釋大二別舉譬帖合二初分科點示二於別下隨文釋義七初別合海二別合河三別合山四併合王城地五合衆生六併合人天七合道二就絶待答二初分科二初總下隨釋二初總二初不可說二明可說二別二初明略常所以二就三下隨文解釋二初標科二今文下隨釋三初釋大我二初不可思議釋大二初釋我無我二初牒經文二舊有下出古解二初出二師二觀師破二初破初解三初破二救三竝二破第二解二初正破五初今正破二彼反難三今反問四彼答義五今竝難二若爾下結破二釋八自在二多因緣釋大二釋大樂二初分科二初文下隨釋二初不可說大樂四初無苦樂樂二大寂靜樂三大知樂四不壞樂二多因緣大樂二初敘意分科二初有下隨文釋義二初明有因緣二明無因緣三釋大淨三初就不可量釋淨二以純淨名大三舉四義釋二明第二功德約五通二初懸談義旨三初舉