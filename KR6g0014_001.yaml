body:
  text: 錢塘沙門智圓撰釋涅槃經治定疏分二初題目二初疏文通題二撰治嘉號二本文二初離文通示二初引古敘意三初分節元始二此經下科段盈縮二初標盈縮二梁武下示盈縮三雖蘭下總結開遮二今分下約今正示二初分科二隨釋七初列章二示處三釋名四生起五通別六引證三初標二示二初引多文二引一處三初正引經文二然佛下略示經旨三召諸下對韋明義五初對衆二初疏主對衆義二私謂下治者示衆數二對施三對行四對義五對用三今依下結七出異解七初梁武三初敘彼義二若以下斥古非三今隨下顯今是二開善二初敘古二序即下顯今三光宅二初敘古二只是下顯今四靈味二初敘二既處下斥五河西六地人七興皇二隨文別釋五初序品明召請涅槃衆二初總標示二又諸下別解釋二初通序二初約義總示三初約一期四教二初正明五義二初約義泛明三初標示二如是下正明三展轉下結意二又小下歷教委示三初經教來意二若言下正明四教二初正明如是二如是下結例餘四三故龍下引證總結二此通下結略指廣二屬今家五章二初約別對五章二初標二釋五初如是序衆二我聞序施三一時序行四住處序義五同聞序用二約通具五章二初結前生後二夫衆下約義委明三對此經要義二初對三點四德二結例指廣二隨文別釋五初如是二我聞二初列四句二三種下判今昔三一時二初例三諦二後一下利今昔四住處二初釋化主二釋住處二初約事釋四初釋城二釋地三釋河四釋樹二只此下約教釋二初總標二若見下別示二初約世間二若見下約出世二初約偏機所見二約圓機所見三初標二茅城下釋二初共表四德二各表四德三若能下結五同聞二初例前略示二就同下分經廣釋二初科文二初文下隨釋二初衆集二初敘意分經二初治者敘意二同聞下疏主分經二隨經釋義四初與三初引論總立二若三下約教別釋四初藏二通三別四圓三今言下結示今文二歎三初引證總明二天王下約教別釋三大權下例前結示三類二初正釋比丘二初引論略標二不仰下對教廣釋二例明衆義二初指例二四人下釋義二初引論總明二暖等下約教別釋二初歷示二僧二初正明二餘二下結示二有羞下重明四義四數二威儀二別序二從純陀至大衆問合十六品明開演涅槃施三從現病至德王五品品明顯示涅槃行四師子吼一品明問答涅槃義五迦葉陳如及後分四品明折攝涅槃用二別序二初分科二又為下隨釋三初能召二初分科二聲召下隨釋二初約次第釋義三初聲召二初科分二初二下隨釋六初聲時表法二聲時臨機三聲之本末二初總釋二又空下約教四聲之橫豎三初略消文二敘他解三顯今義二初明橫豎該收以斥他二若以下結示有頂以斥他五聲有感應六聲中歎告二初科分敘意二初歎下隨文正釋二初歎二初科分二初先下隨釋二初雙歎兩德二初科文二初文下隨釋二初歎內德二歎外德二雙結兩德二初科分二初為下隨釋二初結三號二結四等二告三初正解疑問二前具下徵文釋妨二初疑問二大覺下答釋二初約師即主父釋二復次下舉後攝初釋三若依下例前約教二光召二初科文二初文下隨釋四初光時二結出處四初表佛性釋二又青下表三語釋三又大下表涅槃釋四又濟下表六道六根釋三光所照四光利益二初敘古斥非二今文下示今正義二初蠲三障二戀慕生善三動召二然聲下明前後隨機二所召三結召二所召二初科分二總召下隨釋二初總明所召二初科分二初文下隨釋四初抑苦二興請三釋請二初分科二言執下隨釋三初發起請二正釋請三結請四釋苦二別明所召二初分科二此土下隨釋二初召此土二初科分二閻浮下隨釋三初召閻浮衆三初科分總示二他人下敘他分經三初聲下依科正釋三初聲聞二初分科二僧又下隨釋二初僧衆二初科分釋疑二佛邊下依科解義二初佛邊衆二初科分二初云下隨釋三初所召二奉召三願召二初對辨廣略二問答釋疑二初約無學問二約四教答二外來衆二初分科二所召下隨釋二初所召二初分科二初數下隨釋四初數二類三歎二初歎自行德二歎化他德二初徵文具化他義二夫象下配釋喻意二初釋如大龍象二初約龍象體異釋二或只下約龍象體同釋二釋檀林師子四結二奉召二初分科二初光下隨釋三初光召二初奉召二順召二初正明順召二簡順召意二聲召二初奉召二順召三動召二初奉召二順召二尼衆二初分科二列衆下隨釋二初列衆二初科分二所召下隨釋二初所召二初分科二列中下隨釋四初名二數三位四歎二初歎自行德二歎化他德二奉召三初光召二初奉召二順召二初正明順召二簡順召意二聲召二初奉召二順召三動召二初奉召二順召二發迹三初分經敘意二初云下正釋經文二初指通位二別指高位三他分下敘他斥非二菩薩三雜衆二召中間衆三召上界衆二召他土二菩薩衆二初科分二所召下隨釋二初所召二初分科二初一下隨釋六初數二類三初標示翻名二經論釋義二初釋論十義二大品十門二初正引經文二龍樹釋義三此中下約教顯今三位四名五歎二初科分二初文下隨釋三初單歎上求德二約四弘兼下化德二初科分二己階下隨釋二初總歎二別歎三結上求下化德六結二初總結上求下化二別結下化二奉召三初光召二初奉召二順召二初正明順召二簡順召意二聲召二初奉召二順召三動召二初奉召二順召三雜衆二初科分二初二下隨釋三初二十一衆增數草一初二河沙優婆塞衆二初分科二初所下隨釋三初所召二初分科二初二下隨釋五初數二類二初正解釋二初釋優婆塞二初經論通名二約