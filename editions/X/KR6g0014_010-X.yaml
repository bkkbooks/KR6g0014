body:
  text: 錢塘沙門釋智圓撰三習解除惑用二初敘意分科二此即下隨文釋義二初明如來習解已滿故不與世諍三初觀解二論義四初番二初問二答三初唱十法二列十法三結不諍二番二初問二答二初明有二明無三番二初問二初正作相違問二結佛有顛倒二答四番二初問二答二初分科二第三下隨釋三初明觀與不觀為常無常之本二初總明觀與不觀四初明三漏是所觀境二出能觀人三出不能觀者四雙舉二人二單明觀者二初單出人二廣明其人二初總二初正明觀漏二自能勤修二別二初正明觀漏三初觀因三初法二譬三合二觀果報三觀輕重二能自勤修三初法二譬三合二正明常無常果二初不從煩惱生得常果二從煩惱生得無常果三結所屬之人二初結得常果是如來二結得無常果是凡夫三結成不諍之用二明諸菩薩等觀解除惑二明諸菩薩等觀解除惑二初敘意分科二初出下隨文釋義四初觀漏體三初番二初問二答三初欲漏三初出體二引證二初指所出二但明下辨同異三結名二有漏三初出體二簡異欲漏三結名三無明漏二初出體二能生諸漏三初唱二釋三結二番二初問二答三初唱兩章門二釋二初互因果二互增長三譬結三番二初問二答二初分科二先明下隨釋三初唱有兩無明二釋兩無明二初內無明二外漏三結兩果二觀漏因二初番二初問二答四初外因二內因三為觀得道四引證二番二初問二答二初譬二合三觀漏果二初番二初問二答二初分科二就報下隨釋二初報果二習果二番二初分科二問意下隨釋二初問二初略三初唱有無漏果二明智者斷果三問斷無漏果二廣三初唱有無漏之果二云何言斷三問云何言有二答二初分科二言身下隨釋三初舉因果互說三初唱如來有兩種說二明世人之說三出如來之說二明無漏無果三明無煩惱果二初明斷惑二明修道四結觀智三單明生善用二初分科二緣起下隨釋二初番二初問三初緣起三初法二譬三結二正問三結問二答二初分科二初歎下隨釋三初歎問二合前譬三結能修之人即佛性力二番二初問二答二初分科二佛答下隨釋二初總答二初譬二合二別答二初總別分科二觀五下隨文釋義二初觀五陰二初懸示經意二初示不觀色識所以二於三下示開行陰所以二觀中下隨文正釋四初觀受二初分科二初觀下隨釋四初觀受體二觀受因三觀受果四修道二觀想二初約陰簡示二觀想下隨文釋義四初體二初分科二初問下隨釋二初正觀體二問答二初問二初敘異解二初數人二論家二故迦下明今釋二初依經文顯義二佛或下示總別相攝二答二因二初正觀因二問答二初番二初問二答二番二初問二答三果四修三觀欲四初體二因三果四修四觀業四初體二因三果二初分科二答中下隨釋二初正解四業二問答料簡二初番二初問二答二番二初問二答四修二觀十二因緣二初懸談義旨三初例有四段二初依經例示二初疏主例示二治者助顯二以此下推義斥謬二十地下對明三四二初他經唯三二此中下今文有四二初標示長出二苦之下點示所以三然此下四句相生二初對經辨示二初約句正辨二初各開四句二即應下結數示經二但九下研詳去取二初研詳正辨二初準理唯十一二但出下結集安十二二今此下對經結示二夫相下正示相生二初標示儀式二且作下依式廣明四初煩惱四句二業四句三有四句四苦四句二初正示四句二文云下懸示下文二就觀下隨文正解四初體二初分科二初正下隨釋四初明因果相生二初正辨相生二結十二義二觀五道皆苦三觀三界皆苦四觀八苦二因三果四修二歎經二初分科述意二初問下隨文正解三初正就教歎二初番二初問二答二番二初問二答二初分科二第二下隨釋二初歎二答二初廣舉二十五譬二結指涅槃二就行歎二初分科敘意二初分科二此有下敘意二初標二言下釋二初明下隨文正釋二初明道品二初分科懸敘二初科分經文二莊嚴下懸示名位三初兩家異釋二觀師雙彈三天台下疏主和會二就初下依文正釋二初正明道品體三初明真解為是四初明三十七品為梵行之宗二明離道品則不得果三結是四釋是之意二明有漏則非二初分科二問意下隨釋四初番二初問二答二番二初問二答三番二初問二答二初明向無漏故非倒二明唯一心非梵行四番二初問二答三還結真是二明道品因緣二初懸示體性二初總示二婆下別顯二初依婆沙標示二約道下歷道品分別二此文下分科正解二初分科二此第下隨釋五初列名二明體二初分科二答中下隨釋二初問二答二初讚問二正答三釋義二初釋欲為根本二初釋二初答二譬二料簡二初番二初問二答二番二初問二答二釋觸二初總示文意二文云下別釋淨相二初牒文徵難二而今下引義解釋二初牒義二有二下解釋三釋攝受四釋增二初唱二釋五釋念三初法二譬三合六釋導七釋勝三初法二譬三合八釋實二初舉定伏非實二正明智斷是實九釋畢竟二初分科二而文下隨釋二初明四沙門果猶非究竟二正明得大涅槃乃為究竟四約法二初分科二此初下隨釋三初約法二約人三就譬五料簡二初分科二初復下隨釋二初問二答二明十想三就佛歎二明十想二初分科二此初下隨釋二初問二答三初總標二初標二列三初定體示位二大品下對辨異同三但此下約文顯義二初分科二古來下隨義二初前六明觀行二初別主對二初標對二言厭下示義二通相成二後四明出離二解釋二初分科二言二下隨釋三初別解六想二初問二合六初無常想二初標二釋二初麤二細二苦想三無我想四食厭想二初分科二文中下隨釋三初正明二論義