body:
  text: 錢塘沙門釋智圓撰九如來性品答善業見性二問二初題目三初正解題目二初通總釋二初約如來單釋二又如下對性字雙釋四初約人理成世界釋二約因果成為人釋三約隱顯成對治釋四約勝劣成第一義釋二又如下簡顯釋二初簡如來名通二今文下顯今品所辨二初正立二二十下釋義二初略釋品題二諸師下廣明藏義二初古今解釋二初明藏性不即離二初敘古逐破二初敘三師二初敘二義皆下破二敘地人二初略斥明離二初章安敘斥二荊溪與奪二彼以下廣破顯即二初疏主引經正顯二治者徵經助釋二又論下判古明今二初判古偏據之失二顯今圓普之得二又人下明藏性非四句二初引他據經執有二是義下顯今通約四門二初斥他顯今二初約性體俱非以斥專執二雖非下約隨機說四以斥專執二今明下結示今義二問答料簡二初問二答二初答問二若欲下答異二有師下懸談五譬三然此下顯示答問三初正示答問二此兩下釋答問意三論人下解善業義二初古釋二初論人約妄事釋業四初正立作業義二中論師難三論人自答四即竝下中論師竝破二地人約真理釋業二初約理用釋業二若下約業是事用破二今明下今解二初簡顯二若約下判位二初約六即正判二約四句重示二本文二本文二初答善業作二初分科二初業下隨釋二初佛性為善業作緣二初業緣二初問二答二初分科二法下隨釋二初本有不可見三初法二初本有二不可見二譬二初分科二隨釋四初譬本有二譬不可見三譬緣感四譬顯說三合二初合二帖合二不即得說以釋疑二初分科對顯二舊下隨文釋義二初譬四初起有我病二說無我藥二初分科二隨釋三初佛智觀機二得機設化三斷邪我三邪我病息四真我教興四初為說二違情三重說四受行二合二初敘意指同二問下隨文釋義二初合說無我藥二合真我教興二初以因難果二以昔難今二論義二初分科二初問下隨釋二初問二初總唱無二別作難三初總分科二初為下隨文釋義四初四難約果二初始生終沒雙二差別勝負雙二兩難約因二初約惡因二約惡緣三四難又約果四初據苦果二據苦緣三據忘失四據憶念四兩難難處二初難別在何中二難徧在身中三或可下示義通二答二初分科二所言下隨釋二初兩譬答覓現用二初敘意分科二初文下隨文釋義二初譬三初譬四初本有性理二遇緣起惑二初分科二隨釋二初起惑二失理三根緣扣召四聖應破惑二初分科二隨釋二初譬偏說二譬圓說二初分科二初文下隨釋四初為說二不受三重說四即受二合二初標示二初合下正釋三初合遇緣起惑二合招苦感召三合聖應說法二初分科二先合下正釋二初合偏說二初合作觀二合不知二合圓說二初分科二正合下隨釋二初合重說二合即受二初正合二初有惑時不信二除惑時信受二舉譬帖三結二譬二初敘意分科二初文下隨文釋義二初譬四初失二初理性二辨失二得二初分科二隨釋二初少分得二具足得三重失四重得二合二初標示二此初下隨釋二初合第一明失二合第三重明失二利钁答覓處二佛性正起善業二答能見難見性二利钁答覓處二初敘意分科二初正下隨文釋義二初正說三初牒不可壞二廣辨三總結二論義二初分科二隨釋二初問二答二初分科二一云下隨釋二初法四初一云下可殺成業二初斥古解二今用下明今釋二釋疑三簡外道四明正我相二譬二初分科二隨釋二初譬二初為五陰可毀作譬二為佛性不可毀作譬二合二佛性能起善業二初分科二隨釋二初明作業二論義二初分科二初雙下隨釋二初雙問二佛答二初分科敘意二初約下隨文釋義三初明愚智二人三初佛更徵問二迦葉答三佛為釋二初分科二古來下隨釋二初雙辨愚智二初譬二初服甘有夭壽疏總釋二初古解二今釋二服毒有死生疏總釋二初古解二今釋二合二偏明智者二一體三寶人二初對前述意二初文下依科正釋三初勸二初科分二初如下隨釋二初勸二釋勸二論義二初分科二初總下隨釋二初番併不受二初問四初唱不知二初總不知二別不知二問昔別體二初分科二此半下隨釋三初問佛二問法三問僧三問今一體二初分科二隨釋四初法二譬三合譬四難佛四結問請答二初明不知結請二明佛知請答二答二初分科二隨釋四初詶其請答二詶問一體三詶問別體二初正示二問下釋妨四詶唱不知二番併歸依二初敘問意二隨文釋二初問三初欲依昔別二欲依自隱三欲依他顯二答二初分科二初別下隨釋三初昔別體有依不依二初今不須依二初昔緣故不依二釋不依意二昔則須依二初為化須依二釋須依意二顯時一體有依不依二初不依二初分科二初明下隨釋二初明不依二釋意二須依二初科分二隨釋二初正明二解釋三隱時一體正是所勸二初分科二初別下隨釋三初法五初分別自身一體二初示文二問下釋疑二初釋佛寶在果疑二釋三乘作竝疑二初竝立二論下答釋二為他作一體三結別體四結一體五雙結二譬二初屬配三法二大將下顯示各三三合二初分科二隨釋二初正合二結勸二初分科二昔別下隨釋二初勸捨昔別體二初出昔三寶二勸捨二勸取今一體三領解二初分科二一發下隨釋四初領解三初發迹二自領解三誓化他二勸持三稱歎四述成三明中道圓觀三中道圓觀二初分科二隨釋三初許說二正說二初分科二初標下隨釋二初略三初標中道二乖中惑二初分科二隨釋二初明惑二初正釋經文二若下敘古被呵二結惑二初分科二隨釋三初法二譬三合三破惑觀二初分科二亦下隨釋二初正明二結解二初分科二隨釋二初法二譬二廣二初分科示義二初