body:
  text: 錢塘沙門釋智圓撰二聖行品明聖行二初題目二初列章二正示四初次第二初破古二初敘二義皆下破二明今二釋名二初歷名釋義二初釋五名二初正釋聖義二初標示二通稱下簡顯二初簡通顯別二初明來意二何者下正簡顯二初簡通二若復下顯別二經文下斥他結意二梵者下兼解餘名二初解次第名二如來下解不次第名二釋行字二文列下結意顯題三枝本二初正明枝本二初敘古二是義下明今二初斥古非二顯今是二初引經二言下示義二有師下兼示餘義二初單約五行二初約次第釋二初古明佛無病行二是義下今釋病行唯佛二若五下約互具釋三初結前生後二迦葉下正示互具三若判下結顯誡勸二有師下五一對明二初明五一因行無殊二初敘古二斥顯二明五一圓漸有異二初敘古以束散釋義不分圓漸二其理下明今以圓漸釋義斥古束散二初約理行以縱奪二諸佛下約漸不知圓以斥古四此品下說不說二初章安正解現文三初標示二何者下釋意二初釋不說天行意二初疏主約可見釋二治者約指應釋二初正述意二初住下兼解名二病行不釋不說病行意三故說下總結二荊溪研詳前品二本文二本文二初分科二標中下隨釋三初雙標五一二初釋文二初標次第行四初標人二標法三列名四結勸二標不次第行三初標名二標人三標法二問下簡示二雙釋五一二初分科二初人下隨釋三初聖行二初雙釋次不次行三初雙釋戒行三初雙釋戒行二初釋次第二初建心二初遇人緣二遇法緣二立行二初分科二受文下隨釋二初受戒三初處二師三受二持戒二初分科二初譬下隨釋二初法二譬二初譬二合二釋不次第二初分科二初根下隨釋四初具枝本二具事理三具輕重四具誓願二初分科二初一下隨釋二初自誓三初內不起破戒心二不受外施三不為根塵所破二願他三初簡通別二清淨下對三聚三不退下隨難釋二雙釋戒果二初懸示次位二初簡示二舊下釋義二初敘古解二明今釋三初例因示意二言同下約位正釋二初合辨證同二若單下開論果異二初約別二約就下約圓三文意下結顯合辨二釋文下正釋經文二初分科二初標下隨釋四初標二譬三釋三初約三諦二約三障三約四德四結三雙釋行名二初分科二釋中下隨釋三初標二釋三初舉偏圓兩人二舉定慧二法三總舉七財七覺三結二雙釋定行三雙釋慧行二歎經二梵行三嬰兒行三單結五行二雙釋定聖行二初分科二開善下隨釋二初明次第定二初明行二初懸示定體二初敘古非二初敘古二此義下斥非二此中下明今釋二初正明定體二諸師下顯古迷文二初文下正釋經文二初分科二初言下隨釋二初特勝二初明修二明證二初分科二初文下隨釋二初正明證相二明此證法與解俱發二背捨二初分科二初云下隨釋二初明修二明證二初分科二即得下隨釋二初正是證相二證中之解二明果二初敘意分科二舊云下隨文釋義二初標二釋二明圓定二初懸談義旨二初敘古異解二此義下明今正釋二初斥古明今二問此下問答釋妨二初問答二初徵文說戒非定疑二約圓即戒而定答二問答二初因果不次疑二圓融不定答二文為下正釋經文三初略二初問二合二廣二初問二合三文殊述事二初問二合三雙釋慧聖行二初分科二他云下隨釋二初明慧行二初釋慧行二初釋次第慧二初敘意二初他師單約開合釋二今明下今家兼約三教釋二初斥他不曉對緣二今一下今師正約三教二舊或下隨釋三初釋四諦慧二初懸判文旨二初引他解二初舊人以境智為諦二興皇以佛性為諦二若依下明今釋二初斥他不曉文旨二今約四教分經二就初下隨經釋義四初有作四諦二初分科二初如下隨釋三初略六初標列二釋名三釋用四釋體五釋制立六更廣體二廣二初分科二初生下隨釋四初苦諦三初略八苦二初正釋經文八初生苦二老苦三病苦四死苦二初釋前三句死義二初疏主正釋二初疏主明二句是死二引古明三句俱死二治者助釋二放逸下釋後三句死義五愛別離苦六冤憎會苦七求不得苦八五盛陰苦二夫八下示別體有無二廣八苦二初分科二初下隨釋八初生苦三初明生為苦本二明生死相關二初分科二法說下隨釋二初法二初凡夫貪著二菩薩厭離二譬二初分科二初往下隨釋二初譬二初作厭離譬四初生可忻二死可惡三生死相關四菩薩俱捨三初俱捨二俱去三喜處二作貪著譬四初俱越凡夫二凡夫貪愛三生境檢讓四凡心應境二合二初合菩薩厭二合凡夫貪三明生多過患二初分科二婆羅下隨釋五初譬二初譬四初淺行求生天果二深行呵責三淺行懷愧四菩薩勸捨二合二初合懷愧二合勸捨二譬三譬四譬五譬二老苦疏總釋二初標可解二然生下示前後二初正示前後二明病下兼釋病文三病苦疏總釋二初標可解二然生下示前後二初正示前後二明病下兼釋病文四死苦二初分科二初文下隨釋二初正覲死二初定苦二初示難知二初正示二例如下引例二今只下正出體二至論下正消文三初消唯除菩薩三初他釋二今明下今破三被除下心解二初約圓示義二如此下結顯文旨二消金剛暴雨二初立難二初徵文總問二若不下據義雙難二死傷下答釋二初明金剛喻同二當知下明金碎體別三消蛇星二傷痛五愛別離苦六冤憎會苦七求不得苦八五盛陰苦三會通二集諦三滅諦四道諦三結二無生四諦即有作四諦中第三料簡文三無量四諦四無作四諦二釋二諦慧在無量四諦科中三釋一諦慧二釋圓慧二釋慧行名二明慧果三會通二初述意敘古二初述經來意二敘古分章二今先下分科隨解二初分科二就初下隨解二初問三初總